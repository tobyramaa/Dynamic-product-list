<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 p-10">
    <div class="bg-teal-100 shadow-lg rounded-xl p-6 max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold text-center">Welcome to Rama Stores</h2>
        <p class="text-center mt-4 text-gray-600">Your one-stop shop for all your needs</p>
        <div class="mt-6 flex justify-center">
            <input id="search" type="text" placeholder="Search products..." class="border p-2 rounded-lg w-1/2">
        </div>

        <div class="flex justify-center gap-4 mt-6 flex-wrap">
            <button class="filter-btn border border-teal-500 text-teal-500 px-4 py-2 rounded hover:bg-teal-50 hover:text-teal-900 transition duration-200 cursor-pointer" data-category="all">All</button>
            <button class="filter-btn border border-teal-500 text-teal-500 px-4 py-2 rounded hover:bg-teal-50 hover:text-teal-900 transition duration-200 cursor-pointer" data-category="electronics">Electronics</button>
            <button class="filter-btn border border-teal-500 text-teal-500 px-4 py-2 rounded hover:bg-teal-50 hover:text-teal-900 transition duration-200 cursor-pointer" data-category="fashion">Fashion</button>
            <button class="filter-btn border border-teal-500 text-teal-500 px-4 py-2 rounded hover:bg-teal-50 hover:text-teal-900 transition duration-200 cursor-pointer" data-category="groceries">Groceries</button>

        </div>

        <div id="productContainer" class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-8 w-full max-w-6xl mx-auto min-h-[500px]">
        </div>

        <div class="text-center mt-8">
            <h3 class="text-xl font-bold">
                Total Price: ₦<span id="totalPrice">0</span>
            </h3>
        </div>


    </div>
    <script src="script.js"></script>
</body>
</html>
